name: Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "42"
  TORCH_DETERMINISTIC: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - name: Ruff check
        run: ruff check tinyrl tests
      - name: Ruff format
        run: ruff format --check tinyrl tests

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip-audit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - name: Set deterministic env
        run: |
          echo "PYTHONHASHSEED=$PYTHONHASHSEED" >> $GITHUB_ENV
          echo "TORCH_DETERMINISTIC=$TORCH_DETERMINISTIC" >> $GITHUB_ENV
          echo "CUBLAS_WORKSPACE_CONFIG=:4096:8" >> $GITHUB_ENV
      - name: Pytest (exclude slow)
        run: pytest tests/ -v --cov=tinyrl --cov-report=xml -m "not slow"
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mini training run
        run: pytest tests/test_training.py::TestTrainingPipeline::test_mini_training_run -v

  security-trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          bandit -r tinyrl/ -c pyproject.toml

  static-advisory:
    name: Pylint and Pyright (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pylint tinyrl/
          mypy tinyrl/
          pyright tinyrl/

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e "."
      - name: Short training smoke
        run: |
          python train.py --config configs/train/ppo_cartpole.yaml --timesteps 1000 --no-wandb
          python train.py --config configs/train/a2c_lunarlander.yaml --timesteps 1000 --no-wandb
      - name: CLI help smoke
        run: |
          python quantize.py --help
          python distill.py --help
          python prune.py --help
          python codegen.py --help

  docs:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - run: mkdocs build --site-dir docs/_build
      - uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build

  arm-none-eabi-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ARM GCC smoke test
        run: pytest tests/test_codegen.py::TestArmToolchainSmoke -v

  docker-trivy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: tinyrl:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: tinyrl:ci
          format: table
          exit-code: "0"

  release-prep:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docs, bandit, pip-audit, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Generate SBOM
        run: python scripts/generate_sbom.py --output-file sbom.json --project-version 0.1.0
      - uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs/_build
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            sbom.json
            docs/_build
